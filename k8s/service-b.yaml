apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-b
  namespace: tracing-demo
  labels:
    app.kubernetes.io/name: service-b
    app.kubernetes.io/component: consumer
    app.kubernetes.io/part-of: rabbitmq-dotnet-tracing-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: service-b
  template:
    metadata:
      labels:
        app.kubernetes.io/name: service-b
        app.kubernetes.io/component: consumer
        app.kubernetes.io/part-of: rabbitmq-dotnet-tracing-demo
    spec:
      initContainers:
        - name: copy-dotnet-auto-instrumentation
          image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-dotnet:1.12.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
          args:
            - cp -r /autoinstrumentation/. /otel/
          volumeMounts:
            - name: otel-auto-instrumentation
              mountPath: /otel
      containers:
        - name: service-b
          image: tracing-service-b:1.0.0
          imagePullPolicy: IfNotPresent
          env:
            - name: RABBITMQ_HOST
              value: rabbitmq
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USERNAME
              value: demo
            - name: RABBITMQ_PASSWORD
              value: demo
            - name: RABBITMQ_QUEUE
              value: orders
            - name: CORECLR_ENABLE_PROFILING
              value: "1"
            - name: CORECLR_PROFILER
              value: "{918728DD-259F-4A6A-AC2B-B85E1B658318}"
            - name: CORECLR_PROFILER_PATH
              value: /otel/linux-x64/OpenTelemetry.AutoInstrumentation.Native.so
            - name: DOTNET_ADDITIONAL_DEPS
              value: /otel/AdditionalDeps
            - name: DOTNET_SHARED_STORE
              value: /otel/store
            - name: DOTNET_STARTUP_HOOKS
              value: /otel/net/OpenTelemetry.AutoInstrumentation.StartupHook.dll
            - name: OTEL_DOTNET_AUTO_HOME
              value: /otel
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://localhost:4317
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: grpc
            - name: OTEL_PROPAGATORS
              value: tracecontext,baggage
            - name: OTEL_SERVICE_NAME
              value: service-b
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.namespace=tracing-demo,deployment.environment=demo
            - name: OTEL_TRACES_SAMPLER
              value: always_on
            - name: OTEL_LOG_LEVEL
              value: debug
            - name: OTEL_DOTNET_AUTO_LOG_DIRECTORY
              value: /tmp/otel-logs
          volumeMounts:
            - name: otel-auto-instrumentation
              mountPath: /otel
              readOnly: true
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.117.0
          imagePullPolicy: IfNotPresent
          args:
            - --config=/etc/otelcol/otel-collector.yaml
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
          volumeMounts:
            - name: otel-sidecar-config
              mountPath: /etc/otelcol
      volumes:
        - name: otel-auto-instrumentation
          emptyDir: {}
        - name: otel-sidecar-config
          configMap:
            name: otel-sidecar-config
