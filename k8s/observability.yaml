apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: tracing-demo
  labels:
    app.kubernetes.io/name: tempo
    app.kubernetes.io/part-of: rabbitmq-dotnet-tracing-demo
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318

    ingester:
      trace_idle_period: 10s
      max_block_duration: 1m

    compactor:
      compaction:
        block_retention: 1h

    storage:
      trace:
        backend: local
        wal:
          path: /tmp/tempo/wal
        local:
          path: /tmp/tempo/blocks
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: tracing-demo
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: rabbitmq-dotnet-tracing-demo
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Tempo
        type: tempo
        access: proxy
        url: http://tempo:3200
        isDefault: true
        editable: true
        jsonData:
          httpMethod: GET
          tracesToLogsV2:
            datasourceUid: ""
---
apiVersion: v1
kind: Service
metadata:
  name: tempo
  namespace: tracing-demo
  labels:
    app.kubernetes.io/name: tempo
    app.kubernetes.io/part-of: rabbitmq-dotnet-tracing-demo
spec:
  selector:
    app.kubernetes.io/name: observability
  ports:
    - name: http
      port: 3200
      targetPort: tempo-http
    - name: otlp-grpc
      port: 4317
      targetPort: tempo-otlp-grpc
    - name: otlp-http
      port: 4318
      targetPort: tempo-otlp-http
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: tracing-demo
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: rabbitmq-dotnet-tracing-demo
spec:
  selector:
    app.kubernetes.io/name: observability
  ports:
    - name: http
      port: 3000
      targetPort: grafana-http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: observability
  namespace: tracing-demo
  labels:
    app.kubernetes.io/name: observability
    app.kubernetes.io/part-of: rabbitmq-dotnet-tracing-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: observability
  template:
    metadata:
      labels:
        app.kubernetes.io/name: observability
        app.kubernetes.io/part-of: rabbitmq-dotnet-tracing-demo
    spec:
      containers:
        - name: tempo
          image: grafana/tempo:2.6.1
          imagePullPolicy: IfNotPresent
          args:
            - -config.file=/etc/tempo/tempo.yaml
          ports:
            - name: tempo-http
              containerPort: 3200
            - name: tempo-otlp-grpc
              containerPort: 4317
            - name: tempo-otlp-http
              containerPort: 4318
          volumeMounts:
            - name: tempo-config
              mountPath: /etc/tempo
            - name: tempo-data
              mountPath: /tmp/tempo
        - name: grafana
          image: grafana/grafana:11.5.2
          imagePullPolicy: IfNotPresent
          ports:
            - name: grafana-http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
      volumes:
        - name: tempo-config
          configMap:
            name: tempo-config
        - name: tempo-data
          emptyDir: {}
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
