apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-sidecar-config
  namespace: tracing-demo
  labels:
    app.kubernetes.io/name: otel-sidecar-config
    app.kubernetes.io/part-of: rabbitmq-dotnet-tracing-demo
data:
  otel-collector.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch: {}

    exporters:
      otlp/tempo:
        endpoint: tempo:4317
        tls:
          insecure: true

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp/tempo]
